name: "qplex"

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 500000

runner: "episode"
buffer_size: 5000
target_update_interval: 200

agent: "rnn"
agent_output_type: "q"
learner: "dmaq_qatten_learner"
mac: "basic_mac"
double_q: True
mixer: "dmaq"
mixing_embed_dim: 32
hypernet_embed: 64
adv_hypernet_layers: 3
adv_hypernet_embed: 64

num_kernel: 10
is_minus_one: True
weighted_head: True
is_adv_attention: True
is_stop_gradient: True

use_action_repr: False
obs_agent_id: True
obs_last_action: True

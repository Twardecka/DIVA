name: "qtran"

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 500000

runner: "episode"
buffer_size: 5000
target_update_interval: 200

agent: "rnn"
agent_output_type: "q"
learner: "qtran_learner"
mac: "basic_mac"
mixer: "qtran_base"
double_q: True

mixing_embed_dim: 32
network_size: "small"
qtran_arch: "qtran_paper"
opt_loss: 1.0
nopt_min_loss: 0.1

use_action_repr: False
obs_agent_id: True
obs_last_action: True

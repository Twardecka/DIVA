name: "diva_bounded_sigmoid_qmix_DIVA_vscale1"

action_selector: "epsilon_greedy"
epsilon_start: 1.0
epsilon_finish: 0.05
epsilon_anneal_time: 500000

runner: "episode"
buffer_size: 5000
target_update_interval: 200

agent: "rnn_DIVA"
agent_output_type: "q"
learner: "q_learner_DIVA"
mac: "basic_mac_DIVA"
mixer: "bounded_sigmoid_qmix_DIVA"
double_q: True

mixing_embed_dim: 32
hypernet_layers: 2
hypernet_embed: 64

diva_use_spectral_norm: True
diva_r_max: 10.0
diva_positive_offset: 0.001
diva_gate_scale: 1.0
diva_w1_scale: 0.75
diva_w2_scale: 0.75
diva_b1_scale: 1.0
diva_v_scale: 1.0

use_action_repr: False
obs_agent_id: True
obs_last_action: True
